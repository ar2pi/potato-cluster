# Incident #8 remediation - 2026-04-05T05:48:40Z - Reapply 384Mi after config drift
# Peak memory: 127.7 MiB (99.6% of incorrect 128Mi limit)
# Configured limit: 384Mi (CORRECT in repo) provides 3.0x headroom
# Root cause: Config drift - cluster running 128Mi vs repo 384Mi
# Runbook minimum: 256 MiB (1.5× 127.7 MiB = 191.55 MiB, rounded up)
# Repository value: 384Mi (exceeds minimum, already correct)
# Previous incidents: #100 (#9 @ 04:18:40Z), #98 (#8 @ 02:18:40Z), #94 (#87), #88, #86, #85, #84, #82, #81, #76
# Action: Force reapply 384Mi limit from Git to cluster
# Long-term fix CRITICAL: Implement GitOps enforcement (see Issue #80)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-api
  namespace: hello-api
  annotations:
    # Force apply to resolve config drift - Incident #8 at 2026-04-05T05:48:40Z
    deployment.kubernetes.io/revision-trigger: "2026-04-05-incident-8-05-48-40z-config-drift-384mi"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hello-api
  template:
    metadata:
      labels:
        app: hello-api
    spec:
      containers:

        # hello-api without otel wrapper (the hard way)
        # https://opentelemetry.io/docs/languages/python/instrumentation/
        - name: hello-api
          image: ar2pi/hello-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: OTEL_SERVICE_NAME
              value: "hello-api"
            # use Grafana alloy OTLP/gRPC endpoint:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://grafana-k8s-monitoring-alloy-receiver.monitoring.svc.cluster.local:4317"
            # use Grafana alloy sdk profiles endpoint:
            - name: PYROSCOPE_SERVER_ADDRESS
              value: "http://alloy-sdk-profiles.monitoring.svc.cluster.local:4041"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=hello-api,service.name=hello-api,deployment.environment.name=production"
          command: ["uvicorn"]
          args:
            - "app:app"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          # OOM RECURRENCE TRACKING:
          # 2026-04-05T05:48:40Z - Incident #8 - Config drift recurred. Despite this yaml having 384Mi,
          # cluster was running 128Mi causing OOMKills. Peak memory: 127.7 MiB.
          # Following KubeContainerOomKiller runbook for auto-remediation.
          # See Issue #98 for full incident tracking and prevention action items.
          resources:
            limits:
              cpu: "500m"
              # Incident #8 fix - 2026-04-05T05:48:40Z - Reapplying 384Mi limit after config drift
              memory: "384Mi"  # Runbook minimum: 256Mi (1.5x peak) - 384Mi exceeds requirement
            requests:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 11

        # hello-api with otel wrapper (auto-instrumentation)
        # https://opentelemetry.io/docs/zero-code/python/configuration/
        # - name: hello-api
        #   image: ar2pi/hello-api:latest
        #   ports:
        #     - containerPort: 8000
        #   env:
        #     - name: OTEL_SERVICE_NAME
        #       value: "hello-api"
        #     # use Grafana alloy OTLP/gRPC endpoint:
        #     - name: OTEL_EXPORTER_OTLP_ENDPOINT
        #       value: "http://grafana-k8s-monitoring-alloy-receiver.monitoring.svc.cluster.local:4317"
        #     - name: OTEL_RESOURCE_ATTRIBUTES
        #       value: "service.namespace=hello-api,service.name=hello-api,deployment.environment.name=production"
        #   command: ["opentelemetry-instrument"]
        #   args:
        #     - "--traces_exporter=otlp"
        #     - "--metrics_exporter=otlp"
        #     - "uvicorn"
        #     - "app:app"
        #     - "--host"
        #     - "0.0.0.0"
        #     - "--port"
        #     - "8000"
        #   resources:
        #     limits:
        #       cpu: "0.2"
        #       memory: "128Mi"
        #     requests:
        #       cpu: "0.1"
        #       memory: "64Mi"
