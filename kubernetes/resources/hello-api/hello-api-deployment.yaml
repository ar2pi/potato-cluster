# Reapply fix for incident #86 - 2026-04-04T08:17Z - Config drift to 128Mi
# Applied to cluster: 2026-04-03T11:15:13Z - Triggered by OOM incident #76
# Updated: 2026-04-03 - Triggering pipeline to apply 384Mi limit (Issue #78)
# This deployment resolves config drift (384Mi memory limit)
# Applied 2026-04-04T06:17:13Z - Incident #82 remediation (5th config drift occurrence)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-api
  namespace: hello-api
  annotations:
    # Trigger deployment application to resolve config drift
    deployment.kubernetes.io/revision-trigger: "2026-04-04-incident-88-oom-remediation"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hello-api
  template:
    metadata:
      labels:
        app: hello-api
    spec:
      containers:

        # hello-api without otel wrapper (the hard way)
        # https://opentelemetry.io/docs/languages/python/instrumentation/
        - name: hello-api
          image: ar2pi/hello-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: OTEL_SERVICE_NAME
              value: "hello-api"
            # use Grafana alloy OTLP/gRPC endpoint:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://grafana-k8s-monitoring-alloy-receiver.monitoring.svc.cluster.local:4317"
            # use Grafana alloy sdk profiles endpoint:
            - name: PYROSCOPE_SERVER_ADDRESS
              value: "http://alloy-sdk-profiles.monitoring.svc.cluster.local:4041"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=hello-api,service.name=hello-api,deployment.environment.name=production"
          command: ["uvicorn"]
          args:
            - "app:app"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          # OOM RECURRENCE TRACKING:
          # 2026-04-02T18:32:40Z - Config drift recurred. Despite this yaml having 384Mi,
          # cluster was running 128Mi causing OOMKills. Manual kubectl apply required.
          # See Issue #59 for full incident tracking and prevention action items.
          resources:
            limits:
              cpu: "500m"
              memory: "384Mi"  # Changed from 256Mi (1.5x peak usage for safety)
            requests:
              cpu: "250m"
              memory: "256Mi"  # Changed from 128Mi (double current to prevent OOM)
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 11

        # hello-api with otel wrapper (auto-instrumentation)
        # https://opentelemetry.io/docs/zero-code/python/configuration/
        # - name: hello-api
        #   image: ar2pi/hello-api:latest
        #   ports:
        #     - containerPort: 8000
        #   env:
        #     - name: OTEL_SERVICE_NAME
        #       value: "hello-api"
        #     # use Grafana alloy OTLP/gRPC endpoint:
        #     - name: OTEL_EXPORTER_OTLP_ENDPOINT
        #       value: "http://grafana-k8s-monitoring-alloy-receiver.monitoring.svc.cluster.local:4317"
        #     - name: OTEL_RESOURCE_ATTRIBUTES
        #       value: "service.namespace=hello-api,service.name=hello-api,deployment.environment.name=production"
        #   command: ["opentelemetry-instrument"]
        #   args:
        #     - "--traces_exporter=otlp"
        #     - "--metrics_exporter=otlp"
        #     - "uvicorn"
        #     - "app:app"
        #     - "--host"
        #     - "0.0.0.0"
        #     - "--port"
        #     - "8000"
        #   resources:
        #     limits:
        #       cpu: "0.2"
        #       memory: "128Mi"
        #     requests:
        #       cpu: "0.1"
        #       memory: "64Mi"
        #   readinessProbe:
        #     httpGet:
        #       path: /health
        #       port: 8000
        #     initialDelaySeconds: 5
        #     periodSeconds: 5
