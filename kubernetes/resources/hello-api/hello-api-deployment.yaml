# Incident #87 remediation - OOMKill at 01:19:16 UTC - Force apply 384Mi limit
# Peak memory: 109MB (from specialist report) | Configured limit: 384Mi provides 3.5x headroom
# Runbook calculated minimum: 192Mi (109MB × 1.5 rounded to 128Mi boundary)
# Current config: 384Mi (CORRECT) | Cluster state: 84-107MB (DRIFTED)
# Root cause: 7th config drift occurrence - manual kubectl applies overriding GitOps
# Previous incidents: #84, #85, #86, #88, #82, #76, #78 - all config drift related
# Action: Force reapply 384Mi limit from Git to cluster via deployment trigger
# Long-term fix required: Implement GitOps enforcement (see Issue #59)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-api
  namespace: hello-api
  annotations:
    # Force apply to resolve config drift - OOMKill incident at 01:19:16 UTC
    deployment.kubernetes.io/revision-trigger: "2026-oomkill-01-19-16-utc-force-apply-384mi"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hello-api
  template:
    metadata:
      labels:
        app: hello-api
    spec:
      containers:

        # hello-api without otel wrapper (the hard way)
        # https://opentelemetry.io/docs/languages/python/instrumentation/
        - name: hello-api
          image: ar2pi/hello-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: OTEL_SERVICE_NAME
              value: "hello-api"
            # use Grafana alloy OTLP/gRPC endpoint:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://grafana-k8s-monitoring-alloy-receiver.monitoring.svc.cluster.local:4317"
            # use Grafana alloy sdk profiles endpoint:
            - name: PYROSCOPE_SERVER_ADDRESS
              value: "http://alloy-sdk-profiles.monitoring.svc.cluster.local:4041"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=hello-api,service.name=hello-api,deployment.environment.name=production"
          command: ["uvicorn"]
          args:
            - "app:app"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          # OOM RECURRENCE TRACKING:
          # 2026-04-02T18:32:40Z - Config drift recurred. Despite this yaml having 384Mi,
          # cluster was running 128Mi causing OOMKills. Manual kubectl apply required.
          # See Issue #59 for full incident tracking and prevention action items.
          resources:
            limits:
              cpu: "500m"
              memory: "384Mi"  # Changed from 256Mi (1.5x peak usage for safety)
            requests:
              cpu: "250m"
              memory: "256Mi"  # Changed from 128Mi (double current to prevent OOM)
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 11

        # hello-api with otel wrapper (auto-instrumentation)
        # https://opentelemetry.io/docs/zero-code/python/configuration/
        # - name: hello-api
        #   image: ar2pi/hello-api:latest
        #   ports:
        #     - containerPort: 8000
        #   env:
        #     - name: OTEL_SERVICE_NAME
        #       value: "hello-api"
        #     # use Grafana alloy OTLP/gRPC endpoint:
        #     - name: OTEL_EXPORTER_OTLP_ENDPOINT
        #       value: "http://grafana-k8s-monitoring-alloy-receiver.monitoring.svc.cluster.local:4317"
        #     - name: OTEL_RESOURCE_ATTRIBUTES
        #       value: "service.namespace=hello-api,service.name=hello-api,deployment.environment.name=production"
        #   command: ["opentelemetry-instrument"]
        #   args:
        #     - "--traces_exporter=otlp"
        #     - "--metrics_exporter=otlp"
        #     - "uvicorn"
        #     - "app:app"
        #     - "--host"
        #     - "0.0.0.0"
        #     - "--port"
        #     - "8000"
        #   resources:
        #     limits:
        #       cpu: "0.2"
        #       memory: "128Mi"
        #     requests:
        #       cpu: "0.1"
        #       memory: "64Mi"
        #   readinessProbe:
        #     httpGet:
        #       path: /health
        #       port: 8000
        #     initialDelaySeconds: 5
        #     periodSeconds: 5
        #     failureThreshold: 11
# Applied: 2026-04-04T10:47:13Z - Incident #8 (Issue #90) - Config drift fix
