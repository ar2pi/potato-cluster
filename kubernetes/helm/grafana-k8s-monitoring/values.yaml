cluster:
  name: potato

destinations:
  grafana-cloud-metrics:
    type: prometheus
    url: $GRAFANA_METRICS_URL
    auth:
      type: basic
      username: "$GRAFANA_METRICS_USER"
      password: $GRAFANA_ACCESS_TOKEN
  grafana-cloud-logs:
    type: loki
    # make sure 'k8s.cluster.name' resource attribute is used as label
    # it's otlp convention and using unindexed cluster label breaks
    # traces to logs correlation
    # https://grafana.com/docs/loki/latest/get-started/labels/#default-labels-for-opentelemetry
    # https://github.com/grafana/k8s-monitoring-helm/blob/main/charts/k8s-monitoring/destinations/loki-values.yaml#L58-L60
    clusterLabels: [k8s.cluster.name]
    url: $GRAFANA_LOGS_URL
    auth:
      type: basic
      username: "$GRAFANA_LOGS_USER"
      password: $GRAFANA_ACCESS_TOKEN
  grafana-cloud-otlp-endpoint:
    type: otlp
    # make sure 'k8s.cluster.name' resource attribute is used as label
    # it's otlp convention and using unindexed cluster label breaks
    # traces to logs correlation
    # https://grafana.com/docs/loki/latest/get-started/labels/#default-labels-for-opentelemetry
    # https://github.com/grafana/k8s-monitoring-helm/blob/main/charts/k8s-monitoring/destinations/otlp-values.yaml#L57-L59
    clusterLabels: [k8s.cluster.name]
    url: $GRAFANA_OTLP_URL
    protocol: http
    auth:
      type: basic
      username: "$GRAFANA_OTLP_USER"
      password: $GRAFANA_ACCESS_TOKEN
    # processors:
    #   # https://github.com/grafana/k8s-monitoring-helm/blob/main/charts/k8s-monitoring/destinations/otlp-values.yaml#L223-L228
    #   tailSampling:
    #     # Apply tail sampling policies to the traces before delivering them to this destination. This will create an
    #     # additional Alloy instance to handle the tail sampling, and traces sent to this destination will be automatically
    #     # forwarded, using a load balancer component, to the new sampling Alloy instance.
    #     # @section -- Tail Sampling
    #     enabled: true
    #     policies:
    #       # Keep all error traces
    #       - name: error-traces
    #         type: status_code
    #         status_code:
    #           status_codes: [ERROR]
    #       # Keep slow traces (>1s)
    #       - name: slow-traces
    #         type: latency
    #         latency:
    #           threshold_ms: 1000
    #       # Sample 10% of remaining traces
    #       - name: probabilistic-sample
    #         type: probabilistic
    #         probabilistic:
    #           sampling_percentage: 10
    metrics:
      enabled: true
    logs:
      enabled: true
    traces:
      enabled: true
  grafana-cloud-profiles:
    type: pyroscope
    url: $GRAFANA_PROFILES_URL
    auth:
      type: basic
      username: "$GRAFANA_PROFILES_USER"
      password: $GRAFANA_ACCESS_TOKEN

collectors:
  alloy-metrics:
    presets: [clustered, statefulset]
    liveDebugging:
      enabled: true

  alloy-singleton:
    presets: [singleton]
    liveDebugging:
      enabled: true

  alloy-logs:
    presets: [filesystem-log-reader, daemonset]
    liveDebugging:
      enabled: true
    alloy:
      mounts:
        extra:
          - name: var-log-journal
            mountPath: /run/log/journal
    controller:
      volumes:
        extra:
          - name: var-log-journal
            hostPath:
              path: /run/log/journal
              type: DirectoryOrCreate

  alloy-receiver:
    presets: [deployment]
    liveDebugging:
      enabled: true
    alloy:
      extraPorts:
        - name: otlp-grpc
          port: 4317
          targetPort: 4317
          protocol: TCP
        - name: otlp-http
          port: 4318
          targetPort: 4318
          protocol: TCP
        - name: zipkin
          port: 9411
          targetPort: 9411
          protocol: TCP

  alloy-profiles:
    presets: [privileged, daemonset]
    liveDebugging:
      enabled: true

clusterMetrics:
  enabled: true
  collector: alloy-metrics

costMetrics:
  enabled: true
  collector: alloy-metrics

annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics

prometheusOperatorObjects:
  enabled: false
  collector: alloy-metrics

clusterEvents:
  enabled: true
  collector: alloy-singleton

nodeLogs:
  enabled: true
  collector: alloy-logs
  journal:
    path: /run/log/journal

podLogsViaLoki:
  enabled: true
  collector: alloy-logs
  excludeNamespaces:
    # exclude otel-demo
    # to avoid confusion we only want logs sent through alloy-receiver
    - otel-demo
    - otel-demo-local
  # # https://github.com/grafana/k8s-monitoring-helm/tree/main/charts/k8s-monitoring/charts/feature-pod-logs#log-processing
  # labelsToKeep:
  #   - "app_kubernetes_io_name"
  #   - "container"
  #   - "instance"
  #   - "job"
  #   - "level"
  #   - "namespace"
  #   - "service_name"
  #   - "service_namespace"
  #   - "deployment_environment"
  #   - "deployment_environment_name"
  #   - "k8s_namespace_name"
  #   - "k8s_deployment_name"
  #   - "k8s_statefulset_name"
  #   - "k8s_daemonset_name"
  #   - "k8s_cronjob_name"
  #   - "k8s_job_name"
  #   - "k8s_node_name"

applicationObservability:
  enabled: true
  collector: alloy-receiver
  receivers:
    otlp:
      grpc:
        enabled: true
        port: 4317
    zipkin:
      enabled: true
      port: 9411
    metrics:
      enabled: true
    logs:
      enabled: true
    traces:
      enabled: true
  connectors:
    grafanaCloudMetrics:
      enabled: true
  # processors:
  #   attributes:
  #     actions:
  #       # remove cluster label to avoid traces to logs problem
  #       # as 'cluster' is not indexed, 'k8s.cluster.name' is
  #       - key: cluster
  #         action: delete
  # transform:
  #   logs:
  #     resources:
  #       - delete_key(attributes, "cluster")

# careful when running beyla alongside otel-demo
autoInstrumentation:
  enabled: false
  preset: application
  beyla:
    config:
      data:
        attributes:
          kubernetes:
            cluster_name: potato
            enable: true
        # https://grafana.com/docs/beyla/latest/configure/service-discovery/
        discovery:
          exclude_otel_instrumented_services: false
          exclude_services:
          - exe_path: .*alloy.*|.*otelcol.*|.*beyla.*
          # filter out kube-system, monitoring, otel-demo
          - k8s_namespace: .*kube.*|.*monitoring.*|.*otel-demo.*
          services:
          # include hello-api
          - k8s_namespace: .*hello-api.*
        filter:
          network:
            k8s_dst_owner_name:
              not_match: '{kube*,*jaeger-agent*,*prometheus*,*promtail*,*grafana-agent*}'
            k8s_src_owner_name:
              not_match: '{kube*,*jaeger-agent*,*prometheus*,*promtail*,*grafana-agent*}'
        internal_metrics:
          prometheus:
            path: /internal/metrics
            port: 9090
        otel_traces_export:
          endpoint: http://grafana-k8s-monitoring-alloy-receiver.monitoring.svc.cluster.local:4317
          # https://grafana.com/docs/beyla/latest/configure/sample-traces/
          sampler:
            name: "traceidratio"
            arg: "0.1"
        prometheus_export:
          features:
          - application
          - network
          - application_service_graph
          - application_span
          path: /metrics
          port: 9090

profiling:
  enabled: true
  collector: alloy-profiles

integrations:
  alloy:
    instances:
      - name: alloy
        labelSelectors:
          app.kubernetes.io/name:
            - alloy-metrics
            - alloy-singleton
            - alloy-logs
            - alloy-receiver
            - alloy-profiles

telemetryServices:
  kepler:
    deploy: true
  opencost:
    deploy: true
    metricsSource: grafana-cloud-metrics
    opencost:
      exporter:
        defaultClusterId: potato
      prometheus:
        existingSecretName: grafana-cloud-metrics-grafana-k8s-monitoring
        external:
          url: $GRAFANA_CLUSTER_METRICS_URL
  kube-state-metrics:
    deploy: true
